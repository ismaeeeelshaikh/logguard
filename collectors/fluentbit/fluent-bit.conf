[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ─── INPUT SOURCES ────────────────────────────────────────

[INPUT]
    Name              tail
    Path              /var/log/nginx/access.log
    Parser            nginx
    Tag               nginx.access
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Path              /var/log/syslog
    Parser            syslog-rfc3164
    Tag               system.syslog
    Refresh_Interval  5

[INPUT]
    Name              systemd
    Tag               system.journald
    Read_From_Tail    On
    Strip_Underscores On

# ─── FILTERS ──────────────────────────────────────────────

[FILTER]
    Name    record_modifier
    Match   *
    Record  host ${HOSTNAME}
    Record  tenant_id ${LOGGUARD_TENANT_ID}

[FILTER]
    Name   grep
    Match  nginx.access
    Exclude log ^$

# ─── OUTPUT TO KAFKA ──────────────────────────────────────

[OUTPUT]
    Name                          kafka
    Match                         *
    Brokers                       kafka:29092
    Topics                        raw-logs
    Timestamp_Key                 timestamp
    Timestamp_Format              double
    Retry_Limit                   false
    rdkafka.compression.codec     lz4
    rdkafka.request.required.acks -1
